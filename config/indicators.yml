site_headline_outputs:
  home:
    monthly:
      - "unemployment_rate"
      - "adequate_employment_rate"
      - "underemployment_rate"
    quarterly:
      - "five_cities_quarterly_labor"
    annual:
      - "poverty_rate"
      - "extreme_poverty_rate"
      - "nbi_rate"
      - "tpm_rate"

  poverty_story:
    annual:
      - "poverty_rate"
      - "extreme_poverty_rate"
      - "quintile_distribution"
      - "nbi_rate"
      - "tpm_rate"

  quality_story:
    all:
      - "representativity_table"
      - "precision_flags"
      - "sampling_frame_timeline"

validation_rules:
  fail_on_enabled_indicator_without_page: true
  fail_on_enabled_indicator_without_output_group: true
  fail_on_invalid_domain_for_survey_type: true
  fail_on_missing_required_metadata: true
  warn_on_enabled_optional_indicator: true
  warn_on_indicator_without_editorial_role: true

status:
  phase: "4B"
  status_label: "Pipeline configuration scaffold"
  next_phase: "4C"
  next_phase_label: "R helper functions for configuration, paths, periods, domains, and outputs"
