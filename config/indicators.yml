indicator_contract:
  description: "Indicator registry for Ecuador Poverty Monitor. This file controls which indicators are built, which periodicity they use, which domains are valid, and which page consumes them."
  analytical_engine: "enemduR"
  do_not_duplicate_enemduR_logic: true
  require_explicit_domain_validation: true
  require_precision_metadata: true
  require_universe_metadata: true
  require_weight_metadata: true

families:
  income_poverty:
    label_es: "Pobreza monetaria"
    label_en: "Income poverty"
    description_es: "Indicadores basados en ingreso familiar per cápita y líneas de pobreza."
    main_layer: "annual"
    main_page: "pages/02_income-poverty.qmd"

  quintiles:
    label_es: "Quintiles de ingreso"
    label_en: "Income quintiles"
    description_es: "Ordenamiento de personas u hogares por ingreso per cápita para analizar distribución y perfiles."
    main_layer: "annual"
    main_page: "pages/03_quintiles.qmd"

  nbi:
    label_es: "Necesidades Básicas Insatisfechas"
    label_en: "Unsatisfied Basic Needs"
    description_es: "Pobreza estructural basada en carencias de vivienda, hacinamiento, servicios, educación y capacidad económica."
    main_layer: "annual"
    main_page: "pages/04_nbi.qmd"

  tpm:
    label_es: "Pobreza multidimensional"
    label_en: "Multidimensional poverty"
    description_es: "Pobreza entendida como acumulación simultánea de privaciones ponderadas."
    main_layer: "annual"
    main_page: "pages/05_tpm.qmd"

  territory:
    label_es: "Territorio"
    label_en: "Territory"
    description_es: "Lectura territorial según dominios permitidos por la periodicidad de ENEMDU."
    main_layer: "annual"
    main_page: "pages/06_territory.qmd"

  labor:
    label_es: "Trabajo y empleo"
    label_en: "Labor market"
    description_es: "Indicadores laborales usados para conectar pobreza, ingresos y condiciones de empleo."
    main_layer: "monthly"
    main_page: "pages/07_labor.qmd"

  representativity:
    label_es: "Representatividad y precisión"
    label_en: "Representativity and precision"
    description_es: "Indicadores y banderas de calidad inferencial."
    main_layer: "all"
    main_page: "pages/08_representativity.qmd"

  sampling_frame:
    label_es: "Marco muestral"
    label_en: "Sampling frame"
    description_es: "Discusión técnica sobre cobertura, actualización y límites del marco muestral."
    main_layer: "annual"
    main_page: "pages/09_sampling-frame.qmd"

common_output_columns:
  required:
    - "indicator_id"
    - "indicator_label"
    - "indicator_family"
    - "period"
    - "survey_type"
    - "domain"
    - "domain_value"
    - "estimate"
    - "estimate_type"
    - "unit"
    - "source_layer"
    - "build_timestamp"

  recommended:
    - "se"
    - "cv"
    - "n"
    - "df"
    - "weighted_n"
    - "precision_flag"
    - "universe"
    - "weight"
    - "method_note"
    - "source_file"
    - "source_reference"

indicators:
