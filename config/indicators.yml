    output_group: "annual_income_poverty"
    output_name: "poverty_rate"
    estimate_type: "proportion"
    unit: "percent"
    allowed_domains:
      - "national"
      - "area"
      - "five_cities"
      - "province"
    requires:
      income_variable: true
      poverty_line: true
      survey_design: true
      precision: true
      universe: true
      weight: true
    editorial_role: "Main annual poverty headline."

