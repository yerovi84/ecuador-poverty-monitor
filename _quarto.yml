project:
  type: website
  output-dir: docs
  render:
    - index.qmd
    - es/index.qmd
    - pages/*.qmd
  resources:
    - assets/img/brand/*
    - assets/img/territorial/*

website:
  title: "Ecuador Poverty Monitor"
  favicon: assets/img/brand/epm-favicon.png
  description: "A Quarto storytelling data product for understanding poverty in Ecuador beyond a single headline number."
  site-url: "https://yerovi84.github.io/ecuador-poverty-monitor"
  repo-url: "https://github.com/yerovi84/ecuador-poverty-monitor"
  repo-actions:
    - source
    - issue

  navbar:
    logo: assets/img/brand/epm-navbar-logo.svg
    logo-alt: "Ecuador Poverty Monitor"
    title: "Ecuador Poverty Monitor"
    left:
      - text: "Why it matters"
        href: pages/01_why-monitor.qmd
      - text: "Analytical roadmap"
        menu:
          - text: "Income poverty"
            href: pages/02_income-poverty.qmd
          - text: "Deprivation & multidimensional poverty"
            href: pages/03_deprivation-multidimensional-poverty.qmd
          - text: "Provincial income poverty"
            href: pages/05_territorial-province-income-poverty.qmd
          - text: "Statistical quality"
            href: pages/04_methodology-quality.qmd
    right:
      - text: "EN"
        href: index.qmd
      - text: "ES"
        href: es/index.qmd

  page-footer:
    left: "Built by Alejandro Yerovi using enemduR."
    right:
      - text: "GitHub"
        href: "https://github.com/yerovi84/ecuador-poverty-monitor"
      - text: "enemduR"
        href: "https://github.com/yerovi84/enemduR"

format:
  html:
    theme:
      - cosmo
    css: assets/css/site.css
    toc: true
    toc-depth: 3
    toc-location: right
    number-sections: false
    smooth-scroll: true
    code-fold: true
    code-tools: false
    link-external-newwindow: true
    page-layout: article

execute:
  freeze: auto
  warning: false
  message: false

lang: en
